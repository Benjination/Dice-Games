<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Roll Tavern - Classic dice games including Farkle, Pig Dice, and Dice Poker. Play solo or with friends in a cozy dark academia setting.">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://roll-tavern.com/">
  <meta property="og:title" content="Roll Tavern - Classic Dice Games">
  <meta property="og:description" content="Play Farkle, Pig Dice, and Dice Poker. Classic dice games in a cozy dark academia setting.">
  <meta property="og:image" content="https://roll-tavern.com/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:url" content="https://roll-tavern.com/">
  <meta name="twitter:title" content="Roll Tavern - Classic Dice Games">
  <meta name="twitter:description" content="Play Farkle, Pig Dice, and Dice Poker. Classic dice games in a cozy dark academia setting.">
  <meta name="twitter:image" content="https://roll-tavern.com/og-image.png">

  <!-- PWA Configuration -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="Roll Tavern">
  
  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Roll Tavern">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="167x167" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Roll Tavern</title>
  <link rel="manifest" href="manifest.json">
  
  <!-- Theme color for browser chrome -->
  <meta name="theme-color" content="#1a2332">
  <meta name="msapplication-TileColor" content="#1a2332">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
